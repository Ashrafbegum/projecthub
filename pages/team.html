<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Team | ProjectHub</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="../assets/css/main.css">

</head>

<body data-page="team">

<!-- NAVBAR -->
<header class="navbar">

    <div class="navbar__left">
        <div class="navbar__logo">ProjectHub</div>
    </div>

</header>

<div class="app-layout">

    <!-- SIDEBAR -->
   <aside class="sidebar">

            <a href="dashboard.html" class="sidebar__link sidebar__link--active">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-house"></i>
                </span>
                <span class="sidebar__text">Dashboard</span>
            </a>

            <a href="projects.html" class="sidebar__link">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-folder"></i>
                </span>
                <span class="sidebar__text">Projects</span>
            </a>

            <a href="tasks.html" class="sidebar__link">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-square-check"></i>
                </span>
                <span class="sidebar__text">Tasks</span>
            </a>

            <a href="calendar.html" class="sidebar__link">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-calendar"></i>
                </span>
                <span class="sidebar__text">Calendar</span>
            </a>

            <a href="team.html" class="sidebar__link">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-user-group"></i>
                </span>
                <span class="sidebar__text">Team</span>
            </a>

            <a href="settings.html" class="sidebar__link">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-gear"></i>
                </span>
                <span class="sidebar__text">Settings</span>
            </a>

        </nav>

    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <section class="page">

            <!-- PAGE HEADER -->
            <section class="page-header">

                <div>
                    <h1 class="page-header__title">Team</h1>
                    <p class="page-header__subtitle">
                        Manage your project collaborators.
                    </p>
                </div>

                <div class="page-header__actions">
                    <button class="btn btn-primary">Invite Member</button>
                </div>

            </section>

            <!-- TEAM STATS -->
            <section class="team-stats">

                <div class="stat-card">
                    <div class="stat-card__title">Total Members</div>
                    <div class="stat-card__value">12</div>
                </div>

                <div class="stat-card">
                    <div class="stat-card__title">Active Now</div>
                    <div class="stat-card__value">5</div>
                </div>

                <div class="stat-card">
                    <div class="stat-card__title">Admins</div>
                    <div class="stat-card__value">2</div>
                </div>

            </section>

            <!-- FILTER BAR -->
            <section class="filter-bar">

                <input class="input" type="search" placeholder="Search members...">

                <div class="filter-controls">

                    <select class="dropdown__select">
                        <option>Role</option>
                        <option>Admin</option>
                        <option>Developer</option>
                        <option>Designer</option>
                    </select>

                    <button class="btn btn-outline">Filter</button>

                </div>

            </section>

            <!-- TEAM TABLE -->
            <section class="table-wrapper">

                <table class="table">

                    <thead>
                        <tr>
                            <th>Member</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Projects</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr>
                            <td>
                                <div class="member">
                                    <div class="avatar">AJ</div>
                                    <span>Alex Johnson</span>
                                </div>
                            </td>
                            <td>Admin</td>
                            <td><span class="badge badge-success">Active</span></td>
                            <td>4</td>
                        </tr>

                        <tr>
                            <td>
                                <div class="member">
                                    <div class="avatar">SC</div>
                                    <span>Sarah Chen</span>
                                </div>
                            </td>
                            <td>Developer</td>
                            <td><span class="badge badge-warning">Away</span></td>
                            <td>3</td>
                        </tr>

                        <tr>
                            <td>
                                <div class="member">
                                    <div class="avatar">MB</div>
                                    <span>Michael Brown</span>
                                </div>
                            </td>
                            <td>Designer</td>
                            <td><span class="badge badge-success">Active</span></td>
                            <td>5</td>
                        </tr>

                    </tbody>

                </table>

            </section>

        </section>

    </main>

</div>

<script src="../js/pages/team.js"></script>
</>

</html>

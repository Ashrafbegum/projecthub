<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings | ProjectHub</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="../assets/css/main.css">

</head>

<body data-page="settings">

<!-- NAVBAR -->
<header class="navbar">

    <div class="navbar__left">
        <div class="navbar__logo">ProjectHub</div>
    </div>

</header>

<div class="app-layout">

    <!-- SIDEBAR -->
   <aside class="sidebar">

            <a href="dashboard.html" class="sidebar__link sidebar__link--active">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-house"></i>
                </span>
                <span class="sidebar__text">Dashboard</span>
            </a>

            <a href="projects.html" class="sidebar__link">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-folder"></i>
                </span>
                <span class="sidebar__text">Projects</span>
            </a>

            <a href="tasks.html" class="sidebar__link">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-square-check"></i>
                </span>
                <span class="sidebar__text">Tasks</span>
            </a>

            <a href="calendar.html" class="sidebar__link">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-calendar"></i>
                </span>
                <span class="sidebar__text">Calendar</span>
            </a>

            <a href="team.html" class="sidebar__link">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-user-group"></i>
                </span>
                <span class="sidebar__text">Team</span>
            </a>

            <a href="settings.html" class="sidebar__link">
                <span class="sidebar__icon">
                  <i class="fa-solid fa-gear"></i>
                </span>
                <span class="sidebar__text">Settings</span>
            </a>

        </nav>

    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <section class="page settings-layout">

            <!-- HEADER -->
            <section class="page-header">

                <div>
                    <h1 class="page-header__title">Settings</h1>
                    <p class="page-header__subtitle">
                        Manage your account and preferences.
                    </p>
                </div>

                <div class="page-header__actions">
                    <button class="btn btn-primary">Save Changes</button>
                </div>

            </section>

            <!-- SETTINGS GRID -->
            <div class="settings-container">

                <!-- PROFILE SETTINGS -->
                <section class="settings-card">

                    <h3>Profile</h3>

                    <label>Name</label>
                    <input class="input" type="text" value="Alex Johnson">

                    <label>Email</label>
                    <input class="input" type="email" value="alex@email.com">

                    <label>Role</label>
                    <select class="dropdown__select">
                        <option>Admin</option>
                        <option>Developer</option>
                        <option>Designer</option>
                    </select>

                </section>

                <!-- PASSWORD -->
                <section class="settings-card">

                    <h3>Password</h3>

                    <label>Current Password</label>
                    <input class="input" type="password">

                    <label>New Password</label>
                    <input class="input" type="password">

                    <label>Confirm Password</label>
                    <input class="input" type="password">

                </section>

                <!-- PREFERENCES -->
                <section class="settings-card">

                    <h3>Preferences</h3>

                    <div class="setting-item">
                        <span>Email Notifications</span>
                        <input type="checkbox">
                    </div>

                    <div class="setting-item">
                        <span>Dark Mode</span>
                        <input type="checkbox">
                    </div>

                    <div class="setting-item">
                        <span>Auto Assign Tasks</span>
                        <input type="checkbox">
                    </div>

                </section>

                <!-- ACCOUNT -->
                <section class="settings-card danger">

                    <h3>Account</h3>

                    <p>Delete your account permanently.</p>

                    <button class="btn btn-danger">Delete Account</button>

                </section>

            </div>

        </section>

    </main>

</div>

<script src="../js/pages/settings.js"></script>

</body>

</html>
